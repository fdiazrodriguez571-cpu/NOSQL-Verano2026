<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Películas — Consumir API REST</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* MongoDB */
        --slate: #001e2b;
        --slate-soft: #023430;
        --surface: #06283a;
        --surface-2: #0a3450;
        --green: #00ed64;
        --green-dim: #00684a;
        /* Jellyfin */
        --purple: #aa5cc3;
        --blue: #00a4dc;
        --accent: linear-gradient(90deg, var(--purple), var(--blue));

        --text: #e6f2ec;
        --muted: #8aa9b4;
        --line: rgba(138, 169, 180, 0.18);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            900px 500px at 12% -10%,
            rgba(170, 92, 195, 0.22),
            transparent 60%
          ),
          radial-gradient(
            700px 500px at 88% 0%,
            rgba(0, 164, 220, 0.18),
            transparent 60%
          ),
          var(--slate);
      }

      .shell {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      /* ---------- Encabezado ---------- */
      header {
        margin-bottom: 36px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0 0 10px;
      }

      h1 {
        font-family: "Sora", sans-serif;
        font-weight: 700;
        font-size: clamp(34px, 6vw, 52px);
        line-height: 1.02;
        letter-spacing: -0.02em;
        margin: 0;
      }

      h1 span {
        background: var(--accent);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .rule {
        height: 3px;
        width: 120px;
        margin-top: 18px;
        border-radius: 3px;
        background: var(--accent);
      }

      /* ---------- Layout ---------- */
      .grid {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 28px;
        align-items: start;
      }

      .panel {
        background: linear-gradient(
          180deg,
          var(--surface),
          rgba(6, 40, 58, 0.55)
        );
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 24px;
      }

      .panel h2 {
        font-family: "Sora", sans-serif;
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 4px;
      }

      .panel p.hint {
        margin: 0 0 20px;
        font-size: 13px;
        color: var(--muted);
      }

      /* ---------- Formulario ---------- */
      .campo {
        margin-bottom: 14px;
      }

      label {
        display: block;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input {
        display: block;
        width: 100%;
        padding: 11px 12px;
        font: inherit;
        font-size: 14px;
        color: var(--text);
        background: rgba(0, 30, 43, 0.7);
        border: 1px solid var(--line);
        border-radius: 9px;
        outline: none;
        transition:
          border-color 0.18s,
          box-shadow 0.18s;
      }

      input::placeholder {
        color: rgba(138, 169, 180, 0.55);
      }

      input:focus-visible {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(0, 164, 220, 0.22);
      }

      .fila {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      button {
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        border-radius: 9px;
        transition:
          transform 0.12s,
          filter 0.18s,
          background 0.18s;
      }

      button:active {
        transform: translateY(1px);
      }

      button[type="submit"] {
        width: 100%;
        margin-top: 8px;
        padding: 12px 16px;
        color: var(--slate);
        background: var(--green);
        border: none;
      }

      button[type="submit"]:hover {
        filter: brightness(1.1);
      }

      #btnConsultar {
        padding: 10px 18px;
        color: var(--text);
        background: rgba(0, 164, 220, 0.12);
        border: 1px solid rgba(0, 164, 220, 0.45);
      }

      #btnConsultar:hover {
        background: rgba(0, 164, 220, 0.22);
      }

      button:focus-visible {
        outline: 2px solid var(--purple);
        outline-offset: 2px;
      }

      /* ---------- Biblioteca ---------- */
      .barra {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .barra h2 {
        font-family: "Sora", sans-serif;
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }

      ul#listaPeliculas {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 14px;
      }

      ul#listaPeliculas:empty::after {
        content: "Aún no hay títulos. Consulta la API o registra la primera película.";
        grid-column: 1 / -1;
        display: block;
        padding: 40px 24px;
        text-align: center;
        font-size: 14px;
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: var(--radius);
      }

      ul#listaPeliculas li {
        position: relative;
        padding: 18px 18px 18px 22px;
        font-size: 14px;
        line-height: 1.55;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
        transition:
          transform 0.18s,
          border-color 0.18s;
      }

      ul#listaPeliculas li::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 4px;
        background: var(--accent);
      }

      ul#listaPeliculas li:hover {
        transform: translateY(-3px);
        border-color: rgba(0, 237, 100, 0.45);
      }

      footer {
        margin-top: 48px;
        font-size: 12px;
        color: var(--muted);
      }

      @media (max-width: 820px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
    </style>
  </head>

  <body>
    <div class="shell">
      <header>
        <p class="eyebrow">Biblioteca · API REST</p>
        <h1>Tu catálogo de <span>películas</span></h1>
        <div class="rule"></div>
      </header>

      <div class="grid">
        <section class="panel">
          <h2>Registrar película</h2>
          <p class="hint">
            Los datos se envían a la API y aparecen en la biblioteca.
          </p>

          <form id="formulario">
            <div class="campo">
              <label for="titulo">Título</label>
              <input
                type="text"
                id="titulo"
                placeholder="Interestelar"
                required
              />
            </div>

            <div class="campo">
              <label for="genero">Género</label>
              <input
                type="text"
                id="genero"
                placeholder="Ciencia ficción"
                required
              />
            </div>

            <div class="fila">
              <div class="campo">
                <label for="año">Año</label>
                <input type="number" id="año" placeholder="2014" required />
              </div>
              <div class="campo">
                <label for="duracion">Duración (min)</label>
                <input type="number" id="duracion" placeholder="169" required />
              </div>
            </div>

            <div class="fila">
              <div class="campo">
                <label for="idioma">Idioma</label>
                <input type="text" id="idioma" placeholder="Español" required />
              </div>
              <div class="campo">
                <label for="calificacion">Calificación</label>
                <input
                  type="number"
                  id="calificacion"
                  placeholder="8.6"
                  min="0"
                  max="10"
                  step="0.1"
                  required
                />
              </div>
            </div>

            <button type="submit">Guardar película</button>
          </form>
        </section>

        <section>
          <div class="barra">
            <h2>Biblioteca</h2>
            <button id="btnConsultar">Consultar películas</button>
          </div>

          <ul id="listaPeliculas"></ul>
        </section>
      </div>

      <footer>Consumo de API REST · Práctica de desarrollo web</footer>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
  </body>
</html>
